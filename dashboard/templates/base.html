<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Run traces{% endblock %} · Web Agent</title>
  <style>
    :root { --bg:#0f172a; --card:#1e293b; --ink:#e2e8f0; --muted:#94a3b8;
            --accent:#38bdf8; --ok:#22c55e; --err:#f87171; --warn:#fbbf24; --line:#334155; }
    * { box-sizing: border-box; }
    body { margin:0; font-family: system-ui, sans-serif; background:var(--bg); color:var(--ink); }
    header { background:var(--card); border-bottom:1px solid var(--line); padding:14px 28px;
             display:flex; gap:22px; align-items:center; }
    header .brand { font-weight:800; margin-right:auto; }
    header a { color:var(--accent); text-decoration:none; font-weight:600; }
    main { max-width:1000px; margin:28px auto; padding:0 20px; }
    h1 { font-size:22px; } h2 { font-size:17px; color:var(--muted); }
    a { color:var(--accent); }
    .cards { display:flex; gap:16px; flex-wrap:wrap; margin:18px 0; }
    .stat { background:var(--card); border:1px solid var(--line); border-radius:12px;
            padding:16px 22px; min-width:150px; }
    .stat .n { font-size:28px; font-weight:800; }
    .stat .l { color:var(--muted); font-size:13px; }
    table { width:100%; border-collapse:collapse; background:var(--card);
            border:1px solid var(--line); border-radius:12px; overflow:hidden; }
    th, td { text-align:left; padding:10px 14px; border-bottom:1px solid var(--line); font-size:14px; }
    th { color:var(--muted); font-weight:600; }
    .badge { padding:2px 10px; border-radius:999px; font-size:12px; font-weight:700; }
    .s-success { background:rgba(34,197,94,.15); color:var(--ok); }
    .s-failed  { background:rgba(248,113,113,.15); color:var(--err); }
    .s-stuck   { background:rgba(251,191,36,.15); color:var(--warn); }
    .s-running, .s-interrupted, .s-pending { background:rgba(56,189,248,.15); color:var(--accent); }
    .step { background:var(--card); border:1px solid var(--line); border-radius:12px;
            padding:16px; margin-bottom:14px; display:flex; gap:16px; }
    .step img { width:280px; border-radius:8px; border:1px solid var(--line); align-self:flex-start; }
    .step .body { flex:1; }
    .step .act { font-weight:700; }
    .muted { color:var(--muted); font-size:13px; }
    .err { color:var(--err); }
    code { background:#0b1220; padding:1px 6px; border-radius:6px; }
  </style>
</head>
<body>
  <header>
    <span class="brand">📊 Web Agent — Run Traces</span>
    <a href="/">Runs</a>
    <a href="/benchmark">Benchmark</a>
  </header>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
