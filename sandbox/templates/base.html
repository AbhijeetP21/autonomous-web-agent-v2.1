{% import "_icons.html" as ic %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sandbox{% endblock %} · Agent Sandbox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#0a0c10; --surface:#0f1318; --surface-2:#141a21;
      --border:#1b232d; --border-strong:#2a3441;
      --text:#c6ced8; --text-strong:#eef2f7; --muted:#697483;
      --accent:#4d7cfe; --accent-dim:rgba(77,124,254,.14); --accent-hover:#6790ff;
      --ok:#3fb950; --err:#f0596a;
      --mono:'JetBrains Mono',ui-monospace,Menlo,monospace;
      --sans:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family:var(--sans);
           font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; }
    a { color:var(--accent); text-decoration:none; }
    .icon { display:inline-block; vertical-align:-2px; flex:none; }

    .topbar { height:56px; display:flex; align-items:center; gap:8px; padding:0 24px;
              background:var(--surface); border-bottom:1px solid var(--border);
              position:sticky; top:0; z-index:10; }
    .brand { display:flex; align-items:center; gap:9px; font-weight:700;
             color:var(--text-strong); margin-right:auto; letter-spacing:-.01em; }
    .brand .mark { display:grid; place-items:center; width:28px; height:28px; border-radius:6px;
                   background:var(--accent-dim); color:var(--accent); }
    .nav { display:flex; gap:4px; }
    .nav a { display:flex; align-items:center; gap:7px; padding:7px 12px; border-radius:6px;
             color:var(--muted); font-weight:500; }
    .nav a:hover { color:var(--text-strong); background:var(--surface-2); text-decoration:none; }
    .nav a.active { color:var(--text-strong); background:var(--accent-dim); }

    main { max-width:560px; margin:40px auto; padding:0 20px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:10px;
            padding:26px 28px; margin-bottom:18px; }
    h1 { margin:0 0 4px; font-size:19px; font-weight:600; color:var(--text-strong);
         letter-spacing:-.01em; display:flex; align-items:center; gap:9px; }
    h1 + .muted { margin-top:0; margin-bottom:16px; }

    label { display:block; margin:16px 0 6px; color:var(--muted); font-size:12px;
            font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
    input, select { width:100%; padding:10px 12px; border-radius:7px;
                    border:1px solid var(--border-strong); background:#0a0e13;
                    color:var(--text-strong); font-size:14px; font-family:var(--sans); }
    input:focus, select:focus { outline:none; border-color:var(--accent);
                    box-shadow:0 0 0 3px var(--accent-dim); }
    input::placeholder { color:#48515d; }

    button { margin-top:18px; padding:10px 16px; border:0; border-radius:7px; cursor:pointer;
             background:var(--accent); color:#fff; font-weight:600; font-size:14px;
             font-family:var(--sans); display:inline-flex; align-items:center; gap:7px; }
    button:hover { background:var(--accent-hover); }
    button.secondary { background:var(--surface-2); color:var(--text);
                       border:1px solid var(--border-strong); }
    button.secondary:hover { background:var(--elevate,#19212b); color:var(--text-strong); }
    button:disabled { opacity:.55; cursor:default; }
    a button { margin-top:0; }

    .error { color:var(--err); margin-top:12px; font-size:13px; display:flex; gap:6px; }
    .ok { color:var(--ok); font-weight:600; }

    ul { list-style:none; padding:0; margin:14px 0 0; }
    li { display:flex; align-items:center; gap:12px; padding:12px 0;
         border-bottom:1px solid var(--border); }
    li:last-child { border-bottom:0; }
    li.done .todo-text { text-decoration:line-through; color:var(--muted); }
    .todo-text { flex:1; color:var(--text-strong); }
    li button { margin-top:0; padding:6px 12px; font-size:13px; }

    .muted { color:var(--muted); font-size:13px; }
    code { font-family:var(--mono); font-size:12px; background:var(--surface-2);
           border:1px solid var(--border); border-radius:4px; padding:1px 6px; color:var(--text); }
    .steps-tag { font-family:var(--mono); font-size:11px; color:var(--muted);
                 text-transform:uppercase; letter-spacing:.06em; }

    /* Home tiles */
    .tiles { display:grid; gap:12px; margin-top:18px; }
    .tile { display:flex; align-items:center; gap:14px; padding:16px;
            background:var(--surface); border:1px solid var(--border); border-radius:10px; }
    .tile:hover { border-color:var(--border-strong); text-decoration:none; }
    .tile .t-ico { display:grid; place-items:center; width:40px; height:40px; border-radius:8px;
                   background:var(--accent-dim); color:var(--accent); flex:none; }
    .tile .t-title { color:var(--text-strong); font-weight:600; }
    .tile .t-desc { color:var(--muted); font-size:13px; }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="brand">
      <span class="mark">{{ ic.icon('box', 17) }}</span> Agent Sandbox
    </span>
    <nav class="nav">
      <a href="/">{{ ic.icon('home') }} Home</a>
      <a href="/todo">{{ ic.icon('check-square') }} Todo</a>
      <a href="/shop">{{ ic.icon('cart') }} Shop</a>
      <a href="/login">{{ ic.icon('login') }} Login</a>
    </nav>
  </div>
  <main>{% block content %}{% endblock %}</main>
</body>
</html>
