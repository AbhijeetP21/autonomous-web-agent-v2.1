{% extends "base.html" %}
{% block title %}Confirm{% endblock %}
{% block content %}
<div class="card">
  <h1>Checkout — step 3 of 3: Review</h1>
  <p class="muted">Shipping to</p>
  <p><strong>{{ data.full_name }}</strong><br>{{ data.address }}</p>
  <p class="muted">Paying with</p>
  <p>Card ending {{ (data.card_number or '')[-4:] }}</p>
  <form method="post" action="/checkout/complete">
    <button type="submit">Place order</button>
  </form>
</div>
{% endblock %}
