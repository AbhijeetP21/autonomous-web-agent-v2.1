{% extends "base.html" %}
{% import "_icons.html" as ic %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="card">
  <h1>{{ ic.icon('lock', 18) }} Sign in</h1>
  <p class="muted">Use <code>standard_user</code> / <code>secret_sauce</code>.</p>
  <form method="post" action="/login">
    <label for="username">Username</label>
    <input id="username" name="username" type="text" aria-label="Username">
    <label for="password">Password</label>
    <input id="password" name="password" type="password" aria-label="Password">
    {% if error %}<p class="error" id="login-error">{{ error }}</p>{% endif %}
    <button type="submit">{{ ic.icon('login', 15) }} Login</button>
  </form>
</div>
{% endblock %}
