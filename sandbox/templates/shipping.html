{% extends "base.html" %}
{% import "_icons.html" as ic %}
{% block title %}Shipping{% endblock %}
{% block content %}
<div class="card">
  <h1>{{ ic.icon('cart', 18) }} Checkout — step 1 of 3: Shipping</h1>
  <form method="post" action="/checkout/shipping">
    <label for="full_name">Full name</label>
    <input id="full_name" name="full_name" type="text" value="{{ data.full_name or '' }}" aria-label="Full name">
    <label for="address">Shipping address</label>
    <input id="address" name="address" type="text" value="{{ data.address or '' }}" aria-label="Shipping address">
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <button type="submit">Continue to payment {{ ic.icon('arrow-right', 15) }}</button>
  </form>
</div>
{% endblock %}
